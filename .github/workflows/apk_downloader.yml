name: Google Play dl

on:
  workflow_dispatch:
    inputs:
      app_input:
        description: 'Package name OR Google Play URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/dl/
            !/apks/


      - name: Parse Input
        env:
          RAW_INPUT: ${{ inputs.app_input }}
        run: |
          if [[ "$RAW_INPUT" == *"id="* ]]; then
            PKG=$(echo "$RAW_INPUT" | grep -oP 'id=\K[^&]+')
          else
            PKG="$RAW_INPUT"
          fi
          echo "pkg=$PKG" >> $GITHUB_ENV

      - name: Download apkeep
        run: |
          wget -q https://github.com/EFForg/apkeep/releases/latest/download/apkeep-x86_64-unknown-linux-gnu -O apkeep
          chmod +x apkeep

      - name: Fetch APK
        run: |
          mkdir -p temp_dl
          ./apkeep -a ${{ env.pkg }} -d apk-pure temp_dl/

      - name: Process File
        run: |
          cd temp_dl
          DOWNLOADED_FILE=$(ls -1A | head -n 1)
          
          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "Error: Downloaded file not found."
            exit 1
          fi

          mkdir -p ../apks
          mv "$DOWNLOADED_FILE" "../apks/"
          
          cd ..
          rm -rf temp_dl

      - name: Commit and Push
        run: |
          git config user.name "NET-Sentinel Bot"
          git config user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          git add --sparse apks/
          git commit -m "Add ${{ env.pkg }} at: $(TZ='Asia/Tehran' date '+%H:%M:%S')" || echo "No changes to commit"
          git -c committer.name="Diana-Cl" -c committer.email="135276904+Diana-Cl@users.noreply.github.com" commit --amend --no-edit
          git push
